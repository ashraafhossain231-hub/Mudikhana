<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Store Dashboard v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #0F172A; color: #F8FAFC; }
        .glass-card { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .neon-accent { color: #10B981; text-shadow: 0 0 10px rgba(16, 185, 129, 0.3); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .tab-active { border-bottom: 3px solid #10B981; color: #10B981; }
    </style>
</head>
<body class="min-h-screen pb-24">

    <header class="sticky top-0 z-50 p-4 glass-card border-b border-slate-800 flex justify-between items-center">
        <h1 class="text-xl font-bold neon-accent">মডার্ন মুদিখানা</h1>
        <div class="flex gap-4 text-sm font-medium">
            <button onclick="switchTab('pos')" id="posBtn" class="tab-active pb-1">POS</button>
            <button onclick="switchTab('report')" id="reportBtn" class="text-slate-400 pb-1">রিপোর্ট</button>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4">
        
        <div id="posSection" class="space-y-6">
            <div class="relative mt-4">
                <input type="text" id="searchInput" class="w-full bg-slate-900 border border-slate-700 rounded-2xl py-3 px-5 text-white outline-none focus:ring-2 focus:ring-emerald-500" placeholder="পণ্য খুঁজুন...">
            </div>

            <div id="calculatorCard" class="glass-card p-6 rounded-[2.5rem] hidden">
                <h2 id="pName" class="text-2xl font-bold text-white mb-1">পণ্য</h2>
                <p class="text-emerald-400 text-sm mb-6">৳ <span id="pPrice">0</span> / কেজি বা ইউনিট</p>

                <div class="grid grid-cols-2 gap-4 mb-4">
                    <input type="number" id="weightInput" class="bg-slate-900 border-none rounded-2xl py-3 px-4 text-xl font-bold text-emerald-400" placeholder="পরিমাণ">
                    <select id="unitSelect" class="bg-slate-900 border-none rounded-2xl text-white">
                        <option value="gm">গ্রাম (gm)</option>
                        <option value="kg">কেজি (kg)</option>
                        <option value="pcs">পিস (pcs)</option>
                    </select>
                </div>

                <div class="bg-slate-900/80 p-5 rounded-3xl border border-emerald-500/20 mb-4">
                    <p class="text-slate-400 text-xs">মোট বিল:</p>
                    <p class="text-3xl font-black text-white">৳ <span id="totalCost">0.00</span></p>
                </div>

                <button onclick="completeSale()" class="w-full bg-emerald-600 text-white font-bold py-4 rounded-2xl shadow-lg">বিক্রি সম্পন্ন করুন (Save)</button>
            </div>
        </div>

        <div id="reportSection" class="hidden space-y-6 animate-in fade-in duration-500">
            <div class="grid grid-cols-2 gap-4">
                <div class="glass-card p-4 rounded-3xl text-center">
                    <p class="text-slate-400 text-xs uppercase">আজকের মোট বিক্রি</p>
                    <p class="text-2xl font-bold text-emerald-400">৳ <span id="todayTotal">0</span></p>
                </div>
                <div class="glass-card p-4 rounded-3xl text-center">
                    <p class="text-slate-400 text-xs uppercase">মোট কাস্টমার</p>
                    <p class="text-2xl font-bold text-white"><span id="totalOrders">0</span> জন</p>
                </div>
            </div>

            <div class="glass-card p-6 rounded-3xl">
                <h3 class="text-sm font-bold text-slate-400 mb-4 uppercase">বিক্রির গ্রাফ (আজ)</h3>
                <canvas id="salesChart"></canvas>
            </div>

            <button onclick="clearSalesData()" class="w-full py-2 text-red-400 text-sm opacity-50 hover:opacity-100">আজকের রিপোর্ট রিসেট করুন</button>
        </div>
    </main>

    <button onclick="toggleModal()" class="fixed bottom-8 right-8 w-14 h-14 bg-emerald-500 rounded-full shadow-2xl flex items-center justify-center text-white text-2xl z-50 hover:scale-110 transition-transform">+</button>

    <div id="addModal" class="fixed inset-0 bg-black/80 backdrop-blur-md hidden z-[100] flex items-center justify-center p-6">
        <div class="glass-card w-full max-w-sm rounded-[2rem] p-8">
            <h2 class="text-xl font-bold mb-4">নতুন পণ্য যোগ করুন</h2>
            <input type="text" id="newName" class="w-full bg-slate-900 rounded-xl p-3 mb-3" placeholder="পণ্যের নাম">
            <input type="number" id="newPrice" class="w-full bg-slate-900 rounded-xl p-3 mb-4" placeholder="কেজি প্রতি দাম">
            <div class="flex gap-2">
                <button onclick="saveProduct()" class="flex-1 bg-emerald-500 py-3 rounded-xl font-bold">সেভ</button>
                <button onclick="toggleModal()" class="flex-1 bg-slate-800 py-3 rounded-xl">বাতিল</button>
            </div>
        </div>
    </div>

    <script>
        // Database logic
        let inventory = JSON.parse(localStorage.getItem('storeItems')) || [
            { bnName: "মসুর ডাল", price: 140 }, { bnName: "চিনি", price: 135 }
        ];
        let salesData = JSON.parse(localStorage.getItem('dailySales')) || [];

        let currentProduct = null;
        let chartInstance = null;

        // Tabs logic
        function switchTab(tab) {
            if(tab === 'pos') {
                document.getElementById('posSection').classList.remove('hidden');
                document.getElementById('reportSection').classList.add('hidden');
                document.getElementById('posBtn').classList.add('tab-active');
                document.getElementById('reportBtn').classList.remove('tab-active');
            } else {
                document.getElementById('posSection').classList.add('hidden');
                document.getElementById('reportSection').classList.remove('hidden');
                document.getElementById('reportBtn').classList.add('tab-active');
                document.getElementById('posBtn').classList.remove('tab-active');
                updateReport();
            }
        }

        // Search & Calc
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value;
            const product = inventory.find(p => p.bnName.includes(term));
            if(product && term !== "") {
                currentProduct = product;
                document.getElementById('calculatorCard').classList.remove('hidden');
                document.getElementById('pName').innerText = product.bnName;
                document.getElementById('pPrice').innerText = product.price;
                calculate();
            } else {
                document.getElementById('calculatorCard').classList.add('hidden');
            }
        });

        function calculate() {
            let qty = parseFloat(document.getElementById('weightInput').value) || 0;
            let unit = document.getElementById('unitSelect').value;
            let total = (unit === 'gm') ? (currentProduct.price/1000)*qty : currentProduct.price*qty;
            document.getElementById('totalCost').innerText = total.toFixed(2);
        }

        document.getElementById('weightInput').oninput = calculate;
        document.getElementById('unitSelect').onchange = calculate;

        // Sales Logic
        function completeSale() {
            const total = parseFloat(document.getElementById('totalCost').innerText);
            if(total <= 0) return;

            const sale = {
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                item: currentProduct.bnName,
                total: total
            };

            salesData.push(sale);
            localStorage.setItem('dailySales', JSON.stringify(salesData));
            
            // হোয়াটসঅ্যাপ মেমো (অপশনাল)
            const text = `দোকান মেমো:\nপণ্য: ${sale.item}\nমোট: ৳${sale.total}\nধন্যবাদ!`;
            window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
            
            // Reset
            document.getElementById('searchInput').value = '';
            document.getElementById('weightInput').value = '';
            document.getElementById('calculatorCard').classList.add('hidden');
            alert('বিক্রি সেভ করা হয়েছে!');
        }

        // Report Logic
        function updateReport() {
            let totalVal = 0;
            salesData.forEach(s => totalVal += s.total);
            document.getElementById('todayTotal').innerText = totalVal.toFixed(2);
            document.getElementById('totalOrders').innerText = salesData.length;

            const ctx = document.getElementById('salesChart').getContext('2d');
            if(chartInstance) chartInstance.destroy();

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: salesData.map(s => s.time),
                    datasets: [{
                        label: 'বিক্রি (৳)',
                        data: salesData.map(s => s.total),
                        borderColor: '#10B981',
                        backgroundColor: 'rgba(16, 185, 129, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: { responsive: true, plugins: { legend: { display: false } } }
            });
        }

        // Add Product logic
        function toggleModal() { document.getElementById('addModal').classList.toggle('hidden'); }
        function saveProduct() {
            const name = document.getElementById('newName').value;
            const price = document.getElementById('newPrice').value;
            if(name && price) {
                inventory.push({ bnName: name, price: parseFloat(price) });
                localStorage.setItem('storeItems', JSON.stringify(inventory));
                toggleModal();
                alert('পণ্য যোগ হয়েছে!');
            }
        }

        function clearSalesData() {
            if(confirm('আপনি কি নিশ্চিত যে সব বিক্রির ডাটা মুছে ফেলবেন?')) {
                salesData = [];
                localStorage.setItem('dailySales', JSON.stringify(salesData));
                updateReport();
            }
        }
    </script>
</body>
</html>
