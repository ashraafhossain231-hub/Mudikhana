<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ভাই ভাই স্টোর - স্মার্ট ড্যাশবোর্ড</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #0F172A; color: #F8FAFC; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); }
        .neon-border { border: 1px solid rgba(16, 185, 129, 0.3); box-shadow: 0 0 15px rgba(16, 185, 129, 0.1); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; }
    </style>
</head>
<body class="pb-20">

    <nav class="p-4 glass sticky top-0 z-50 flex justify-between items-center shadow-2xl">
        <h1 class="font-bold text-xl text-emerald-500">ভাই ভাই স্টোর</h1>
        <div id="authArea">
            <button onclick="login()" id="loginBtn" class="bg-emerald-600 px-4 py-1.5 rounded-xl text-sm font-bold">লগইন</button>
        </div>
    </nav>

    <main class="max-w-md mx-auto p-4 space-y-6">
        
        <div id="salesReport" class="hidden grid grid-cols-2 gap-4">
            <div class="glass p-4 rounded-2xl text-center neon-border">
                <p class="text-xs text-slate-400 uppercase">আজকের মোট বিক্রি</p>
                <p class="text-2xl font-black text-emerald-400">৳ <span id="todayTotal">0</span></p>
            </div>
            <div class="glass p-4 rounded-2xl text-center neon-border">
                <p class="text-xs text-slate-400 uppercase">আজকের মোট বাকি</p>
                <p class="text-2xl font-black text-orange-500">৳ <span id="todayDue">0</span></p>
            </div>
        </div>

        <div class="glass p-4 rounded-[2rem]">
            <input type="text" id="searchInput" oninput="filterItems()" placeholder="পণ্যের নাম লিখুন..." class="w-full bg-slate-900 border border-slate-700 rounded-2xl py-3 px-5 outline-none focus:ring-2 focus:ring-emerald-500 transition-all">
        </div>

        <div id="productList" class="grid grid-cols-1 gap-3">
            </div>

        <div id="calcCard" class="fixed inset-0 bg-black/80 z-[100] hidden flex items-center justify-center p-4">
            <div class="glass w-full max-w-sm p-8 rounded-[2.5rem] relative">
                <button onclick="closeCalc()" class="absolute top-4 right-6 text-3xl text-slate-400">×</button>
                <h2 id="dispName" class="text-2xl font-bold mb-1">পণ্য</h2>
                <p class="text-emerald-400 mb-6">৳ <span id="dispPrice">0</span> / কেজি</p>
                
                <input type="text" id="buyerName" placeholder="ক্রেতার নাম (ঐচ্ছিক)" class="w-full bg-slate-900 p-3 rounded-xl mb-4 border border-slate-700">
                
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <input type="number" id="qty" oninput="doCalc()" class="bg-slate-900 p-4 rounded-xl text-xl font-bold text-emerald-400" placeholder="পরিমাণ">
                    <select id="unit" onchange="doCalc()" class="bg-slate-900 p-4 rounded-xl">
                        <option value="kg">কেজি</option>
                        <option value="gm">গ্রাম</option>
                    </select>
                </div>

                <div class="flex gap-4 mb-4">
                    <button id="paidBtn" onclick="setStatus('Paid')" class="flex-1 py-2 rounded-xl bg-emerald-600/20 border border-emerald-500 text-emerald-500 font-bold active-status">নগদ</button>
                    <button id="dueBtn" onclick="setStatus('Due')" class="flex-1 py-2 rounded-xl bg-slate-800 border border-slate-700 text-slate-400">বাকি</button>
                </div>

                <div class="bg-slate-900 p-4 rounded-2xl text-center mb-6">
                    <p class="text-3xl font-black">৳ <span id="total">0.00</span></p>
                </div>

                <button onclick="saveAndSend()" class="w-full bg-emerald-600 py-4 rounded-2xl font-bold text-lg">হোয়াটসঅ্যাপ মেমো</button>
            </div>
        </div>

        <div id="adminPanel" class="hidden glass p-6 rounded-3xl mt-10">
            <h3 class="text-orange-400 font-bold mb-4">অ্যাডমিন: নতুন পণ্য যোগ করুন</h3>
            <div class="space-y-3">
                <input type="text" id="newName" placeholder="পণ্যের নাম" class="w-full bg-slate-900 p-3 rounded-xl">
                <input type="number" id="newPrice" placeholder="মূল্য" class="w-full bg-slate-900 p-3 rounded-xl">
                <button onclick="addNewProduct()" class="w-full bg-orange-500 py-3 rounded-xl font-bold">সেভ করুন</button>
            </div>
        </div>

    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDV8z9HMAwoLRb5OVu2G1rQnRmS1f-QFwI",
            authDomain: "my-modern-store-f7cd8.firebaseapp.com",
            projectId: "my-modern-store-f7cd8",
            storageBucket: "my-modern-store-f7cd8.firebasestorage.app",
            messagingSenderId: "959347442093",
            appId: "1:959347442093:web:fb89c34bc8db0c9d5e2124",
            measurementId: "G-WYSVGQBBYG"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const adminEmail = "marufhos3n@gmail.com";

        let allProducts = [];
        let currentStatus = "Paid";

        auth.onAuthStateChanged(user => {
            if (user && user.email === adminEmail) {
                document.getElementById('adminPanel').classList.remove('hidden');
                document.getElementById('salesReport').classList.remove('hidden');
                fetchTodaySales();
            }
            fetchProducts();
        });

        async function login() {
            const provider = new firebase.auth.GoogleAuthProvider();
            await auth.signInWithPopup(provider);
        }

        async function fetchProducts() {
            const snap = await db.collection('products').get();
            allProducts = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderList(allProducts);
        }

        function renderList(list) {
            const container = document.getElementById('productList');
            container.innerHTML = list.map(p => `
                <div onclick="openCalc('${p.name}', ${p.price})" class="glass p-4 rounded-2xl flex justify-between items-center cursor-pointer hover:bg-emerald-500/5 transition">
                    <span class="font-bold">${p.name}</span>
                    <span class="text-emerald-400">৳ ${p.price}</span>
                </div>
            `).join('');
        }

        function filterItems() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allProducts.filter(p => p.name.toLowerCase().includes(query));
            renderList(filtered);
        }

        function openCalc(name, price) {
            document.getElementById('calcCard').classList.remove('hidden');
            document.getElementById('dispName').innerText = name;
            document.getElementById('dispPrice').innerText = price;
            document.getElementById('qty').value = '';
            document.getElementById('total').innerText = '0.00';
        }

        function closeCalc() { document.getElementById('calcCard').classList.add('hidden'); }

        function doCalc() {
            const p = parseFloat(document.getElementById('dispPrice').innerText);
            const q = parseFloat(document.getElementById('qty').value) || 0;
            const u = document.getElementById('unit').value;
            const res = (u === 'gm') ? (p/1000)*q : p*q;
            document.getElementById('total').innerText = res.toFixed(2);
        }

        function setStatus(status) {
            currentStatus = status;
            document.getElementById('paidBtn').className = status === 'Paid' ? 'flex-1 py-2 rounded-xl bg-emerald-600/20 border border-emerald-500 text-emerald-500 font-bold' : 'flex-1 py-2 rounded-xl bg-slate-800 border border-slate-700 text-slate-400';
            document.getElementById('dueBtn').className = status === 'Due' ? 'flex-1 py-2 rounded-xl bg-orange-600/20 border border-orange-500 text-orange-500 font-bold' : 'flex-1 py-2 rounded-xl bg-slate-800 border border-slate-700 text-slate-400';
        }

        async function saveAndSend() {
            const name = document.getElementById('dispName').innerText;
            const buyer = document.getElementById('buyerName').value || "কাস্টমার";
            const qty = document.getElementById('qty').value;
            const unit = document.getElementById('unit').value;
            const total = document.getElementById('total').innerText;
            const date = new Date().toLocaleDateString();

            // Save to Firestore
            await db.collection('sales').add({
                item: name,
                amount: parseFloat(total),
                status: currentStatus,
                date: new Date().toISOString().split('T')[0]
            });

            // WhatsApp Message Format
            const msg = `*ভাই ভাই স্টোর*%0A--------------------------%0A*Buyer:* ${buyer}%0A*Product:* ${name}%0A*Quantity:* ${qty} ${unit}%0A*Total:* ৳ ${total}%0A*Status:* ${currentStatus === 'Paid' ? '✅ Paid' : '❌ Due'}%0A*Date:* ${date}%0A--------------------------%0Aধন্যবাদ আবার আসবেন!`;
            
            window.open(`https://wa.me/?text=${msg}`, '_blank');
            closeCalc();
            fetchTodaySales();
        }

        async function fetchTodaySales() {
            const today = new Date().toISOString().split('T')[0];
            const snap = await db.collection('sales').where('date', '==', today).get();
            let total = 0, due = 0;
            snap.forEach(doc => {
                if(doc.data().status === 'Paid') total += doc.data().amount;
                else due += doc.data().amount;
            });
            document.getElementById('todayTotal').innerText = total.toFixed(0);
            document.getElementById('todayDue').innerText = due.toFixed(0);
        }

        async function addNewProduct() {
            const n = document.getElementById('newName').value;
            const p = document.getElementById('newPrice').value;
            if(n && p) {
                await db.collection('products').add({ name: n, price: parseFloat(p) });
                location.reload();
            }
        }
    </script>
</body>
    </html>
