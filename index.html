<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Mudikhana - Admin & Customer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #0F172A; color: #F8FAFC; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .side-menu { transition: 0.3s transform ease-in-out; transform: translateX(-100%); }
        .side-menu.active { transform: translateX(0); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; }
    </style>
</head>
<body>

    <nav class="p-4 glass sticky top-0 z-50 flex justify-between items-center shadow-xl">
        <div class="flex items-center gap-3">
            <button onclick="toggleMenu()" class="p-2 bg-slate-800 rounded-lg text-emerald-500">☰</button>
            <h1 class="font-bold text-xl text-emerald-500">স্মার্ট দোকান</h1>
        </div>
        <div id="userProfile" class="flex items-center gap-2">
            <button onclick="googleLogin()" id="loginBtn" class="bg-emerald-600 px-4 py-1.5 rounded-xl text-sm font-bold">লগইন</button>
        </div>
    </nav>

    <div id="sideMenu" class="fixed inset-y-0 left-0 w-72 glass z-[60] side-menu p-6 shadow-2xl">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-xl font-bold text-emerald-500">মেনু অপশন</h2>
            <button onclick="toggleMenu()" class="text-slate-400 text-2xl">×</button>
        </div>
        <nav class="space-y-4">
            <a href="#" onclick="showSection('home')" class="block p-3 hover:bg-emerald-500/10 rounded-xl transition">🏠 হোম ড্যাশবোর্ড</a>
            <a href="#" onclick="showSection('priceList')" class="block p-3 hover:bg-emerald-500/10 rounded-xl transition">📋 সব পণ্যের তালিকা</a>
            <div id="adminLinks" class="hidden pt-4 border-t border-slate-700">
                <p class="text-[10px] text-slate-500 uppercase mb-2 ml-3">অ্যাডমিন প্যানেল</p>
                <a href="#" onclick="showSection('addProduct')" class="block p-3 hover:bg-orange-500/10 text-orange-400 rounded-xl transition">➕ নতুন পণ্য যোগ</a>
                <a href="#" onclick="showSection('reports')" class="block p-3 hover:bg-orange-500/10 text-orange-400 rounded-xl transition">📊 বিক্রির রিপোর্ট</a>
            </div>
        </nav>
    </div>

    <main class="max-w-md mx-auto p-4 mt-4">

        <section id="homeSection" class="space-y-6">
            <div class="glass p-5 rounded-3xl">
                <input type="text" id="searchInput" placeholder="পণ্যের নাম লিখে সার্চ..." class="w-full bg-slate-900 border border-slate-700 rounded-2xl py-3 px-5 outline-none focus:ring-2 focus:ring-emerald-500">
            </div>
            
            <div id="calcBox" class="glass p-6 rounded-[2.5rem] hidden animate-in fade-in duration-300">
                <h2 id="targetName" class="text-2xl font-bold">পণ্য</h2>
                <p class="text-emerald-400 mb-4">৳ <span id="targetPrice">0</span> / কেজি</p>
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <input type="number" id="qtyInput" placeholder="পরিমাণ" class="bg-slate-900 p-3 rounded-xl text-emerald-400 font-bold text-xl">
                    <select id="unitType" class="bg-slate-900 p-3 rounded-xl">
                        <option value="gm">গ্রাম</option>
                        <option value="kg">কেজি</option>
                    </select>
                </div>
                <div class="bg-slate-900/80 p-5 rounded-2xl mb-4 text-center">
                    <span class="text-slate-400">মোট বিল: </span>
                    <span class="text-2xl font-black">৳ <span id="finalBill">0.00</span></span>
                </div>
                <button onclick="saveSale()" class="w-full bg-emerald-600 py-3 rounded-xl font-bold shadow-lg">বিক্রি সেভ করুন</button>
            </div>
        </section>

        <section id="listSection" class="hidden space-y-4">
            <h2 class="text-center text-xl font-bold mb-4">আজকের বাজার দর (প্রতি কেজি)</h2>
            <div id="fullPriceList" class="space-y-3">
                </div>
        </section>

    </main>

    <script>
        // --- Firebase Configuration (আপনার নিজেরটা এখানে বসাবেন) ---
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_ID",
            appId: "YOUR_APP_ID"
        };
        // Firebase ইনিশিয়ালাইজ (যদি কনফিগ থাকে তবেই নিচের লাইন কাজ করবে)
        // firebase.initializeApp(firebaseConfig);

        let currentUser = null;
        let adminEmail = "shuvo@gmail.com"; // এখানে আপনার আসল জিমেইল দিন

        // UI Logic
        function toggleMenu() { document.getElementById('sideMenu').classList.toggle('active'); }

        function showSection(name) {
            document.getElementById('homeSection').classList.add('hidden');
            document.getElementById('listSection').classList.add('hidden');
            if(name === 'home') document.getElementById('homeSection').classList.remove('hidden');
            if(name === 'priceList') {
                document.getElementById('listSection').classList.remove('hidden');
                renderList();
            }
            toggleMenu();
        }

        // Login Logic
        function googleLogin() {
            // আসল জিমেইল লগইন এর জন্য নিচের কোড লাগবে:
            /*
            const provider = new firebase.auth.GoogleAuthProvider();
            firebase.auth().signInWithPopup(provider).then((result) => {
                checkUser(result.user);
            });
            */
            // ডেমো হিসেবে কাজ দেখানোর জন্য:
            let email = prompt("টেস্টের জন্য জিমেইল দিন:");
            if(email) checkUser({email: email, displayName: "User"});
        }

        function checkUser(user) {
            currentUser = user;
            document.getElementById('loginBtn').innerText = user.displayName;
            if(user.email === adminEmail) {
                document.getElementById('adminLinks').classList.remove('hidden');
                alert("স্বাগতম অ্যাডমিন!");
            } else {
                alert("আপনি কাস্টমার হিসেবে লগইন করেছেন।");
            }
        }

        // Inventory Data (LocalStorage for now)
        let items = JSON.parse(localStorage.getItem('storeData')) || [
            { bnName: "মসুর ডাল", price: 140 },
            { bnName: "চিনি", price: 130 }
        ];

        function renderList() {
            const listDiv = document.getElementById('fullPriceList');
            listDiv.innerHTML = items.map(i => `
                <div class="glass p-4 rounded-2xl flex justify-between items-center">
                    <span class="font-bold">${i.bnName}</span>
                    <span class="text-emerald-400 font-bold">৳ ${i.price}</span>
                </div>
            `).join('');
        }

        // Search & Calculation
        const search = document.getElementById('searchInput');
        search.addEventListener('input', (e) => {
            const prod = items.find(i => i.bnName.includes(e.target.value));
            if(prod && e.target.value !== "") {
                document.getElementById('calcBox').classList.remove('hidden');
                document.getElementById('targetName').innerText = prod.bnName;
                document.getElementById('targetPrice').innerText = prod.price;
                calculate();
            }
        });

        function calculate() {
            let p = parseFloat(document.getElementById('targetPrice').innerText);
            let q = parseFloat(document.getElementById('qtyInput').value) || 0;
            let u = document.getElementById('unitType').value;
            let total = (u === 'gm') ? (p/1000)*q : p*q;
            document.getElementById('finalBill').innerText = total.toFixed(2);
        }

        document.getElementById('qtyInput').oninput = calculate;
        document.getElementById('unitType').onchange = calculate;

    </script>
</body>
</html>
